<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Altered Audio — Mastering</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; background: #1a1714; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #scaler { transform-origin: center center; }

  .mast {
    --m-bg: #EAE5DB; --m-panel: #F4F1EA; --m-line: #2A2520;
    --m-grid: rgba(42,37,32,0.10); --m-track: #DCD6C9; --m-fill: #4A443C;
    width: 1520px; height: 1000px; background: var(--m-bg); color: var(--text-body);
    font-family: var(--font-system); display: flex; flex-direction: column;
    border: 1px solid var(--border-default); border-radius: 10px; overflow: hidden;
    box-shadow: 0 24px 64px rgba(28,24,21,0.5);
  }
  .panel { background: var(--m-panel); border: 1px solid var(--border-default); border-radius: 10px; }
  .lbl { font-size: 12px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-muted); }
  .lbl-sm { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); }
  .val { font-family: var(--font-mono); font-size: 13px; color: var(--text-body); }
  .seg-btn { height: 30px; padding: 0 13px; border: 1px solid var(--border-default); background: var(--m-panel);
    font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-body);
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px; border-radius: 7px; }
  .seg-btn:hover { background: var(--surface-sunken); }
  .icon-tog { width: 19px; height: 19px; border-radius: 999px; border: 1.5px solid var(--text-muted);
    display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); flex: 0 0 auto; }
  .icon-tog.on { border-color: var(--accent-primary); color: var(--accent-primary); }
  .dd { height: 30px; padding: 0 10px; border: 1px solid var(--border-default); background: var(--m-panel);
    border-radius: 6px; font-size: 12px; color: var(--text-body); display: inline-flex; align-items: center;
    justify-content: space-between; gap: 8px; cursor: pointer; min-width: 92px; }
  .dd .chev { color: var(--text-muted); }
  .mcard { display: flex; flex-direction: column; padding: 13px 14px 11px; gap: 8px; }
  .mcard .head { display: flex; align-items: center; gap: 8px; }
  .mcard .viz { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 96px; }
  .mcard .foot { display: flex; align-items: baseline; justify-content: space-between; }
  i[data-lucide] { display: inline-flex; }
</style>
</head>
<body>
  <div id="scaler"><div id="root"></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

  <script type="text/babel">
  const INK = "#2A2520", MUT = "#7A746E", ORANGE = "#C4621D";
  const CAT = { dyn: "#C4621D", time: "#7A5438", mod: "#AA8B10", eq: "#3A6694", spat: "#5E8480" };
  const Icon = ({ name, size = 15 }) => <i data-lucide={name} style={{ width: size, height: size }} />;

  /* deterministic pseudo-random */
  const rnd = (s) => { let x = Math.sin(s * 12.9898) * 43758.5453; return x - Math.floor(x); };

  /* ---------- big spectrum analyzer (line + haze) ---------- */
  function Spectrum() {
    const W = 1040, H = 250, padL = 6, padR = 6, padT = 14, padB = 26;
    const plotW = W - padL - padR, plotH = H - padT - padB, baseY = padT + plotH;
    const N = 200;
    // smooth response curve: rise, peaks, gentle high roll-off
    const pts = [];
    for (let i = 0; i <= N; i++) {
      const f = i / N;
      const rise = Math.min(1, Math.pow(f / 0.12, 1.4));
      const tilt = Math.pow(1 - f, 1.15);
      const bumps = 0.10 * Math.sin(f * 26) + 0.06 * Math.sin(f * 60 + 1) + 0.04 * Math.sin(f * 120);
      let v = rise * (0.5 + tilt * 0.5) + bumps * (f > 0.1 ? 1 : 0.2);
      v = Math.max(0.04, Math.min(1, v));
      pts.push([padL + f * plotW, baseY - v * plotH]);
    }
    const path = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
    // haze: faint vertical strokes above ~500Hz region
    const haze = [];
    for (let i = 0; i < 160; i++) {
      const f = 0.34 + (i / 160) * 0.66;
      const x = padL + f * plotW;
      const yTop = pts[Math.round(f * N)][1];
      const h = (rnd(i) * 0.5 + 0.1) * (baseY - yTop);
      haze.push([x, baseY - h, baseY]);
    }
    const gx = [0.0, 0.16, 0.30, 0.46, 0.62, 0.78, 0.92, 1.0];
    const labels = [["20", 0.0], ["50", 0.10], ["100", 0.20], ["200", 0.30], ["500", 0.44], ["1k", 0.56], ["2k", 0.68], ["5k", 0.82], ["10k", 0.91], ["20k", 1.0]];
    return (
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "100%", display: "block" }}>
        {[0.25, 0.5, 0.75].map((g) => (<line key={g} x1={padL} y1={padT + g * plotH} x2={W - padR} y2={padT + g * plotH} stroke="var(--m-grid)" strokeDasharray="2 4" />))}
        {gx.map((f, i) => (<line key={i} x1={padL + f * plotW} y1={padT} x2={padL + f * plotW} y2={baseY} stroke="var(--m-grid)" />))}
        {haze.map((h, i) => (<line key={i} x1={h[0]} y1={h[1]} x2={h[0]} y2={h[2]} stroke={INK} strokeWidth="1" opacity="0.12" />))}
        <path d={path} fill="none" stroke={INK} strokeWidth="1.6" strokeLinejoin="round" />
        {labels.map((l, i) => (<text key={i} x={padL + l[1] * plotW} y={H - 8} textAnchor="middle" fontFamily="var(--font-mono)" fontSize="10" fill={MUT}>{l[0]}</text>))}
      </svg>
    );
  }

  /* ---------- vertical segmented meter (one channel) ---------- */
  function SegMeter({ value }) {
    const segs = 30;
    const lit = Math.round(value * segs);
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 1.5, width: 10, height: 300 }}>
        {Array.from({ length: segs }, (_, i) => {
          const idx = segs - 1 - i;
          const on = idx < lit;
          const frac = idx / segs;
          const col = frac > 0.9 ? ORANGE : frac > 0.78 ? "#9A7A20" : "var(--m-fill)";
          return <div key={i} style={{ flex: 1, background: on ? col : "var(--m-track)", borderRadius: 1, opacity: on ? 1 : 0.55 }} />;
        })}
      </div>
    );
  }
  function IOMeters({ label, l, r, lv, rv }) {
    const scale = [0, -6, -12, -24, -30, -36, -40, -60];
    return (
      <div className="panel" style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "12px 14px", gap: 10, width: 130 }}>
        <span className="lbl">{label}</span>
        <div style={{ display: "flex", gap: 16, alignItems: "flex-start" }}>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 5 }}>
            <span className="lbl-sm">L</span><span className="val">{l}</span><SegMeter value={lv} />
          </div>
          <div style={{ display: "flex", flexDirection: "column", justifyContent: "space-between", height: 300, marginTop: 38 }}>
            {scale.map((s) => (<span key={s} className="mono" style={{ fontSize: 9, color: MUT }}>{s}</span>))}
          </div>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 5 }}>
            <span className="lbl-sm">R</span><span className="val">{r}</span><SegMeter value={rv} />
          </div>
        </div>
        <div style={{ display: "flex", gap: 38 }}><span className="mono" style={{ fontSize: 11, color: MUT }}>-∞</span><span className="mono" style={{ fontSize: 11, color: MUT }}>-∞</span></div>
      </div>
    );
  }

  /* ---------- arc gauge (Dynamics %) ---------- */
  function arcPath(cx, cy, r, a0, a1) {
    const p = (a) => [cx + r * Math.cos(a), cy + r * Math.sin(a)];
    const [x0, y0] = p(a0), [x1, y1] = p(a1);
    const large = a1 - a0 > Math.PI ? 1 : 0;
    return `M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}`;
  }
  function ArcGauge({ value, big, color = ORANGE, center }) {
    const S = big ? 150 : 104, r = big ? 60 : 42, cx = S / 2, cy = S / 2;
    const A0 = Math.PI * 0.75, A1 = Math.PI * 2.25;
    const aV = A0 + value * (A1 - A0);
    return (
      <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`}>
        <path d={arcPath(cx, cy, r, A0, A1)} fill="none" stroke="var(--m-track)" strokeWidth={big ? 7 : 6} strokeLinecap="round" />
        <path d={arcPath(cx, cy, r, A0, aV)} fill="none" stroke={color} strokeWidth={big ? 7 : 6} strokeLinecap="round" />
        {center}
      </svg>
    );
  }

  /* ---------- mini module visualizations ---------- */
  function MiniEQ() {
    const W = 150, H = 92;
    const pts = [[8, 60], [38, 52], [74, 44], [112, 34], [142, 30]];
    const path = `M0 64 C 20 58, 30 56, ${pts[0][0]} ${pts[0][1]} S 60 48, ${pts[1][0]} ${pts[1][1]} S 96 40, ${pts[2][0]} ${pts[2][1]} S 130 30, ${pts[3][0]} ${pts[3][1]} S 150 30, ${pts[4][0]} ${pts[4][1]}`;
    const dots = [[38, 52, CAT.time], [74, 44, CAT.spat], [112, 34, MUT], [142, 30, CAT.dyn]];
    return (<svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
      <path d={path} fill="none" stroke={INK} strokeWidth="1.6" />
      {dots.map((d, i) => (<circle key={i} cx={d[0]} cy={d[1]} r="5" fill={d[2]} />))}
    </svg>);
  }
  function MiniWave() {
    return (<svg width={150} height={92} viewBox="0 0 150 92">
      <path d="M4 46 C 24 18, 36 18, 54 46 S 86 74, 104 46 S 132 18, 146 46" fill="none" stroke={INK} strokeWidth="1.6" />
    </svg>);
  }
  function ImagingArc() {
    const cx = 75, cy = 70, r = 46;
    return (<svg width={150} height={92} viewBox="0 0 150 92">
      <path d={`M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}`} fill="none" stroke={INK} strokeWidth="1.4" />
      <line x1={cx} y1={cy} x2={cx} y2={cy - r} stroke={MUT} strokeWidth="1" />
      <line x1={cx} y1={cy} x2={cx - r * 0.7} y2={cy - r * 0.7} stroke="var(--m-grid)" />
      <line x1={cx} y1={cy} x2={cx + r * 0.7} y2={cy - r * 0.7} stroke="var(--m-grid)" />
      <circle cx={cx} cy={cy - 2} r="4" fill={INK} />
    </svg>);
  }
  function VennLink() {
    return (<svg width={150} height={92} viewBox="0 0 150 92">
      <circle cx={64} cy={46} r="30" fill="none" stroke={INK} strokeWidth="1.4" />
      <circle cx={92} cy={46} r="30" fill="none" stroke={INK} strokeWidth="1.4" />
    </svg>);
  }
  function TransferCurve() {
    return (<svg width={150} height={92} viewBox="0 0 150 92">
      <line x1={10} y1={82} x2={140} y2={10} stroke="var(--m-grid)" />
      <path d="M10 82 C 70 78, 104 40, 128 18" fill="none" stroke={INK} strokeWidth="1.6" />
      <circle cx={128} cy={18} r="3.5" fill={CAT.dyn} />
    </svg>);
  }

  function ModuleCard({ icon, title, value, valLabel, on, setOn, children }) {
    return (
      <div className="panel mcard">
        <div className="head">
          <span className={"icon-tog" + (on ? " on" : "")} onClick={() => setOn(!on)}><Icon name="power" size={11} /></span>
          <span className="lbl">{title}</span>
        </div>
        <div className="viz" style={{ opacity: on ? 1 : 0.4 }}>{children}</div>
        <div className="foot">
          <span className="lbl-sm">{valLabel}</span>
          <span className="val" style={{ fontSize: 14 }}>{value}</span>
        </div>
        <div className="dd" style={{ marginTop: 2 }}><span className="lbl-sm">Details</span><span className="chev"><Icon name="chevron-down" size={13} /></span></div>
      </div>
    );
  }

  /* ---------- loudness history area graph ---------- */
  function LoudnessHistory() {
    const W = 470, H = 165, padL = 30, padB = 22, padT = 8;
    const plotW = W - padL - 8, plotH = H - padB - padT;
    const n = 60, pts = [];
    for (let i = 0; i <= n; i++) { const v = 0.5 + 0.06 * Math.sin(i * 0.4) + 0.04 * Math.sin(i * 0.9 + 1) + (rnd(i) - 0.5) * 0.05; pts.push([padL + (i / n) * plotW, padT + (1 - v) * plotH]); }
    const line = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
    const area = line + ` L ${padL + plotW} ${padT + plotH} L ${padL} ${padT + plotH} Z`;
    const yl = [0, -8, -16, -24, -32, -40];
    return (<svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
      {yl.map((v, i) => { const y = padT + (i / (yl.length - 1)) * plotH; return (<g key={v}><line x1={padL} y1={y} x2={padL + plotW} y2={y} stroke="var(--m-grid)" strokeDasharray="2 4" /><text x={padL - 6} y={y + 3} textAnchor="end" fontFamily="var(--font-mono)" fontSize="9" fill={MUT}>{v}</text></g>); })}
      <path d={area} fill={INK} opacity="0.08" />
      <path d={line} fill="none" stroke={INK} strokeWidth="1.4" />
      {["-60s", "-45s", "-30s", "-15s", "0s"].map((t, i) => (<text key={t} x={padL + (i / 4) * plotW} y={H - 6} textAnchor="middle" fontFamily="var(--font-mono)" fontSize="9" fill={MUT}>{t}</text>))}
    </svg>);
  }

  function StereoField() {
    const cx = 78, cy = 78, dots = [];
    for (let i = 0; i < 420; i++) { const a = rnd(i) * Math.PI * 2; const rad = Math.pow(rnd(i + 99), 0.7) * 60; const sx = Math.cos(a) * rad * 1.35; const sy = Math.sin(a) * rad * 0.6; dots.push([cx + sx, cy - sy]); }
    return (<svg width={156} height={156} viewBox="0 0 156 156">
      <line x1={cx} y1={14} x2={cx} y2={142} stroke="var(--m-grid)" />
      <line x1={14} y1={cy} x2={142} y2={cy} stroke="var(--m-grid)" />
      <line x1={30} y1={30} x2={126} y2={126} stroke="var(--m-grid)" /><line x1={126} y1={30} x2={30} y2={126} stroke="var(--m-grid)" />
      {dots.map((d, i) => (<circle key={i} cx={d[0]} cy={d[1]} r="0.9" fill={INK} opacity="0.5" />))}
      <circle cx={cx} cy={cy} r="3" fill="#fff" stroke={INK} />
      <text x={cx} y={12} textAnchor="middle" fontFamily="var(--font-mono)" fontSize="9" fill={MUT}>M</text>
      <text x={cx} y={152} textAnchor="middle" fontFamily="var(--font-mono)" fontSize="9" fill={MUT}>S</text>
      <text x={8} y={cy + 3} fontFamily="var(--font-mono)" fontSize="9" fill={MUT}>L</text>
      <text x={146} y={cy + 3} fontFamily="var(--font-mono)" fontSize="9" fill={MUT}>R</text>
    </svg>);
  }

  function Dropdown({ label, value }) {
    return (<div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
      <span className="lbl-sm">{label}</span>
      <div className="dd"><span>{value}</span><span className="chev"><Icon name="chevron-down" size={13} /></span></div>
    </div>);
  }

  /* ====================== APP ====================== */
  function App() {
    const [ab, setAb] = React.useState("A");
    const [bypass, setBypass] = React.useState(false);
    const [mods, setMods] = React.useState({ dyn: true, eq: true, sat: true, img: true, link: true, lim: true });
    const setOn = (k) => (v) => setMods((m) => ({ ...m, [k]: v }));
    React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

    return (
      <div className="mast">
        {/* ---- top bar ---- */}
        <div style={{ height: 60, flex: "0 0 auto", display: "flex", alignItems: "center", gap: 14, padding: "0 18px", borderBottom: "1px solid var(--border-default)" }}>
          <div style={{ width: 30, height: 30, borderRadius: 7, background: INK, display: "flex", alignItems: "center", justifyContent: "center", color: ORANGE }}><Icon name="audio-waveform" size={17} /></div>
          <span style={{ fontSize: 17, fontWeight: 800, letterSpacing: "0.08em", color: INK }}>ALTERED AUDIO</span>
          <span style={{ fontSize: 13, fontWeight: 800, letterSpacing: "0.12em", color: ORANGE }}>MASTER</span>
          <span className="mono" style={{ fontSize: 11, color: MUT }}>v1.0.0</span>
          <div style={{ flex: 1 }} />
          <div style={{ display: "flex", alignItems: "center", border: "1px solid var(--border-default)", borderRadius: 7, height: 34, background: "var(--m-panel)" }}>
            <span className="seg-btn" style={{ border: "none", width: 32, justifyContent: "center", padding: 0 }}><Icon name="chevron-left" size={15} /></span>
            <span style={{ width: 300, textAlign: "center", fontSize: 12, fontWeight: 700, letterSpacing: "0.08em", color: INK }}>MODERN PUNCH</span>
            <span className="seg-btn" style={{ border: "none", width: 32, justifyContent: "center", padding: 0 }}><Icon name="chevron-right" size={15} /></span>
          </div>
          <div style={{ display: "flex", border: "1px solid var(--border-default)", borderRadius: 7, overflow: "hidden" }}>
            {["A", "B"].map((x) => (<span key={x} onClick={() => setAb(x)} style={{ width: 34, height: 34, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, cursor: "pointer", background: ab === x ? ORANGE : "var(--m-panel)", color: ab === x ? "#fff" : INK }}>{x}</span>))}
          </div>
          <span className="seg-btn">Compare</span>
          <span className="seg-btn" style={{ width: 34, justifyContent: "center", padding: 0 }}><Icon name="undo-2" size={14} /></span>
          <span className="seg-btn" style={{ width: 34, justifyContent: "center", padding: 0, opacity: 0.4 }}><Icon name="redo-2" size={14} /></span>
          <span className="seg-btn" onClick={() => setBypass(!bypass)} style={{ color: bypass ? MUT : INK, background: bypass ? "var(--surface-sunken)" : "var(--m-panel)" }}>Bypass</span>
        </div>

        {/* ---- analyzer row ---- */}
        <div style={{ display: "flex", gap: 14, padding: "14px 18px 0" }}>
          <IOMeters label="Input" l="-5.2" r="-5.1" lv={0.62} rv={0.64} />
          <div className="panel" style={{ flex: 1, padding: "6px 8px 0" }}><Spectrum /></div>
          <IOMeters label="Output" l="-8.8" r="-8.7" lv={0.5} rv={0.52} />
        </div>

        {/* ---- module cards ---- */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 14, padding: "14px 18px 0" }}>
          <ModuleCard icon="activity" title="Dynamics" value="42%" valLabel="Punch" on={mods.dyn} setOn={setOn("dyn")}>
            <ArcGauge value={0.42} center={<text x="52" y="57" textAnchor="middle" fontFamily="var(--font-mono)" fontSize="20" fontWeight="700" fill={INK}>42%</text>} />
          </ModuleCard>
          <ModuleCard title="EQ" value="32%" valLabel="Tone" on={mods.eq} setOn={setOn("eq")}><MiniEQ /></ModuleCard>
          <ModuleCard title="Saturation" value="18%" valLabel="Drive" on={mods.sat} setOn={setOn("sat")}><MiniWave /></ModuleCard>
          <ModuleCard title="Imaging" value="65%" valLabel="Width" on={mods.img} setOn={setOn("img")}><ImagingArc /></ModuleCard>
          <ModuleCard title="Stereo Link" value="28%" valLabel="Link" on={mods.link} setOn={setOn("link")}><VennLink /></ModuleCard>
          <ModuleCard title="Limiter" value="-0.3 dBTP" valLabel="Ceiling" on={mods.lim} setOn={setOn("lim")}><TransferCurve /></ModuleCard>
        </div>

        {/* ---- bottom row ---- */}
        <div style={{ display: "flex", gap: 14, padding: "14px 18px 0", flex: 1, minHeight: 0 }}>
          {/* loudness */}
          <div className="panel" style={{ width: 430, padding: 16, display: "flex", gap: 18 }}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
              <span className="lbl" style={{ alignSelf: "flex-start" }}>Loudness</span>
              <ArcGauge big value={0.62} color={CAT.time} center={<g><text x="75" y="74" textAnchor="middle" fontFamily="var(--font-mono)" fontSize="30" fontWeight="700" fill={INK}>-14.0</text><text x="75" y="92" textAnchor="middle" fontSize="10" fontWeight="600" letterSpacing="0.1em" fill={MUT}>LUFS</text></g>} />
              <span className="lbl-sm">Integrated</span>
            </div>
            <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", gap: 14 }}>
              {[["Short Term", "-14.5 LUFS"], ["Momentary", "-13.2 LUFS"], ["Loudness Range", "7.2 LU"], ["True Peak", "-0.3 dBTP"]].map((r) => (
                <div key={r[0]} style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", borderBottom: "1px solid var(--m-grid)", paddingBottom: 6 }}>
                  <span className="lbl-sm">{r[0]}</span><span className="val">{r[1]}</span>
                </div>))}
            </div>
          </div>
          {/* loudness history */}
          <div className="panel" style={{ flex: 1, padding: 16, display: "flex", flexDirection: "column", gap: 8 }}>
            <div style={{ display: "flex", alignItems: "center" }}><span className="lbl">Loudness History</span><div style={{ flex: 1 }} /><div className="dd" style={{ minWidth: 78, height: 26 }}><span>60 sec</span><span className="chev"><Icon name="chevron-down" size={12} /></span></div></div>
            <div style={{ flex: 1, display: "flex", alignItems: "center" }}><LoudnessHistory /></div>
          </div>
          {/* correlation + stereo field */}
          <div className="panel" style={{ width: 420, padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>
            <span className="lbl">Correlation</span>
            <div>
              <div style={{ position: "relative", height: 8, background: "var(--m-track)", borderRadius: 4 }}>
                <div style={{ position: "absolute", left: "8%", right: "30%", top: 0, bottom: 0, background: "#C9C2B2", borderRadius: 4 }} />
                <div style={{ position: "absolute", left: "55%", right: "8%", top: 0, bottom: 0, background: INK, borderRadius: 4 }} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}><span className="mono" style={{ fontSize: 9, color: MUT }}>-1</span><span className="mono" style={{ fontSize: 9, color: MUT }}>0</span><span className="mono" style={{ fontSize: 9, color: MUT }}>+1</span></div>
            </div>
            <div style={{ display: "flex", gap: 14, flex: 1, minHeight: 0 }}>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}><span className="lbl-sm">Stereo Field</span><StereoField /></div>
              <div style={{ flex: 1, display: "flex", alignItems: "flex-end", justifyContent: "flex-end" }}><span className="seg-btn" style={{ height: 26 }}>Details</span></div>
            </div>
          </div>
        </div>

        {/* ---- sidechain strip ---- */}
        <div style={{ height: 70, flex: "0 0 auto", display: "flex", alignItems: "center", gap: 18, padding: "0 18px", margin: "14px 0 0", borderTop: "1px solid var(--border-default)" }}>
          <span className="lbl">Sidechain</span>
          <span className="icon-tog"><Icon name="power" size={11} /></span>
          <Dropdown label="Source" value="Internal" />
          <Dropdown label="Low Cut" value="120 Hz" />
          <Dropdown label="High Cut" value="6.00 kHz" />
          <Dropdown label="Listen" value="Off" />
          <div className="panel" style={{ flex: 1, height: 44, display: "flex", alignItems: "center", padding: "0 10px" }}>
            <svg width="100%" height="34" viewBox="0 0 320 34" preserveAspectRatio="none">
              <path d={(() => { let d = "M0 17"; for (let i = 1; i <= 80; i++) { const x = (i / 80) * 320; const y = 17 - (rnd(i) - 0.5) * (8 + rnd(i + 5) * 18); d += ` L ${x.toFixed(1)} ${y.toFixed(1)}`; } return d; })()} fill="none" stroke={INK} strokeWidth="1" opacity="0.7" />
            </svg>
          </div>
          <div style={{ display: "flex", gap: 22, alignItems: "center" }}>
            <div style={{ display: "flex", flexDirection: "column" }}><span className="lbl-sm">Sample Rate</span><span className="val">96.0 kHz</span></div>
            <div style={{ display: "flex", flexDirection: "column" }}><span className="lbl-sm">Oversampling</span><span className="val">4x</span></div>
          </div>
          <span className="seg-btn" style={{ width: 36, justifyContent: "center", padding: 0 }}><Icon name="settings" size={15} /></span>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    function fit() {
      const W = 1520, H = 1000, pad = 16;
      const s = Math.min((innerWidth - pad) / W, (innerHeight - pad) / H, 1);
      const el = document.getElementById('scaler');
      if (el) el.style.transform = 'scale(' + s + ')';
    }
    addEventListener('resize', fit); fit();
    setTimeout(fit, 80); setTimeout(fit, 400);
  </script>
</body>
</html>
