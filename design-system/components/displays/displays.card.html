<!-- @dsCard group="Components" viewport="700x260" name="Displays" subtitle="Amber CRT spectrum + segmented I/O and GR meters" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .row { display: flex; gap: 20px; align-items: stretch; }
  .gl { font-size: var(--fs-10); font-weight: var(--fw-semibold); letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; display: block; }
  .crtwrap { flex: 1; border: var(--border-hairline); border-radius: var(--radius-md); overflow: hidden; }
  .meters { display: flex; gap: 14px; align-items: flex-end; padding: 12px 16px; background: var(--crt-bg); border: var(--border-hairline); border-radius: var(--radius-md); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { CRTDisplay, Meter } = window.AlteredAudioDesignSystem_3ace71;
  function Demo() {
    return (
      <div className="row">
        <div className="crtwrap" style={{maxWidth:420}}>
          <CRTDisplay label="SPECTRUM" height={200} />
        </div>
        <div>
          <span className="gl">Meters</span>
          <div className="meters">
            <Meter value={0.72} label="L" length={150} />
            <Meter value={0.64} label="R" length={150} />
            <Meter value={0.40} mode="gr" label="GR" length={150} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
