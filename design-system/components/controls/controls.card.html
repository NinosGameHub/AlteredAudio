<!-- @dsCard group="Components" viewport="700x300" name="Controls" subtitle="Flat-disc knobs, pill toggle, combo select, text buttons" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .grid { display: flex; flex-wrap: wrap; gap: 32px; align-items: flex-start; }
  .group { display: flex; flex-direction: column; gap: 12px; }
  .gl { font-size: var(--fs-10); font-weight: var(--fw-semibold); letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-muted); }
  .knobs { display: flex; gap: 18px; align-items: flex-start; }
  .btns { display: flex; gap: 10px; align-items: center; }
  .toggles { display: flex; flex-direction: column; gap: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Knob, ToggleSwitch, Select, Button } = window.AlteredAudioDesignSystem_3ace71;
  function Demo() {
    const [tg, setTg] = React.useState(true);
    const [tg2, setTg2] = React.useState(false);
    const [sel, setSel] = React.useState("Peak");
    return (
      <div className="grid">
        <div className="group">
          <span className="gl">Knobs</span>
          <div className="knobs">
            <Knob label="FREQ" value={440} min={20} max={20000} display="440 Hz" />
            <Knob label="DRIVE" value={6} min={0} max={24} display="6.0 dB" showArc accent="var(--cat-dynamics)" />
            <Knob label="GAIN" value={0} min={-24} max={24} display="0.0 dB" disabled />
          </div>
        </div>
        <div className="group">
          <span className="gl">Toggle</span>
          <div className="toggles">
            <ToggleSwitch checked={tg} onChange={setTg} label="Active" />
            <ToggleSwitch checked={tg2} onChange={setTg2} label="Ping-Pong" />
          </div>
        </div>
        <div className="group">
          <span className="gl">Select</span>
          <Select label="TYPE" value={sel} onChange={setSel}
            options={["LowPass","HighPass","BandPass","Notch","Peak","LowShelf"]} />
        </div>
        <div className="group">
          <span className="gl">Buttons</span>
          <div className="btns">
            <Button variant="primary">Add Module</Button>
            <Button variant="secondary">Save</Button>
            <Button variant="ghost" size="sm">Reset</Button>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
