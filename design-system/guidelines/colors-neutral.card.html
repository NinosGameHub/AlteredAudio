<!-- @dsCard group="Colors" viewport="700x150" name="Warm neutrals" subtitle="Dirty ABS-plastic surfaces and warm-grey hairlines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-sm); border: var(--border-hairline); overflow: hidden; }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--surface-card); }
  .name { font-size: var(--fs-12); font-weight: var(--fw-semibold); color: var(--text-body); }
  .hex { font-family: var(--font-mono); font-size: var(--fs-9); color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--aa-bg)"></div><div class="meta"><div class="name">Canvas</div><div class="hex">#E7E2D6 · page</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--aa-surface)"></div><div class="meta"><div class="name">Card</div><div class="hex">#EDE8DC · surface</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--aa-surface-alt)"></div><div class="meta"><div class="name">Pressed</div><div class="hex">#D9D4C8 · sunken</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--aa-border)"></div><div class="meta"><div class="name">Hairline</div><div class="hex">#B2ADA1 · border</div></div></div>
  </div>
</body>
</html>
