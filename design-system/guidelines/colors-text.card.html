<!-- @dsCard group="Colors" viewport="700x160" name="Signal, CRT & knob" subtitle="Active green, amber CRT phosphor, flat cream knob parts" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-sm); border: var(--border-hairline); overflow: hidden; }
  .chip { height: 60px; }
  .meta { padding: 7px 9px; background: var(--surface-card); }
  .name { font-size: var(--fs-12); font-weight: var(--fw-semibold); color: var(--text-body); }
  .hex { font-family: var(--font-mono); font-size: var(--fs-9); color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--state-active)"></div><div class="meta"><div class="name">Active</div><div class="hex">#4CA84C</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--crt-bg)"></div><div class="meta"><div class="name">CRT glass</div><div class="hex">#060504</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--crt-amber)"></div><div class="meta"><div class="name">CRT amber</div><div class="hex">#E4A210</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--knob-body)"></div><div class="meta"><div class="name">Knob disc</div><div class="hex">#E4DFD0</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--knob-line)"></div><div class="meta"><div class="name">Knob line</div><div class="hex">#1C1815</div></div></div>
  </div>
</body>
</html>
